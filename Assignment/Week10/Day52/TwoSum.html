<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Addition</title>

    <script>
      function cal(valid) {
        let n1 = document.getElementById("num1");
        let n2 = document.getElementById("num2");
        let out = document.getElementById("output");

        if (valid) {
          out.value = Number(n1.value) + Number(n2.value);
          out.style.backgroundColor = "lightgreen";
        } else {
          out.value = "";
          out.style.backgroundColor = "white";
        }
      }

      function resultdisplay() {
        let n1 = document.getElementById("num1");
        let n2 = document.getElementById("num2");

        let valid = true;

        if (n1.value == "") {
          n1.style.backgroundColor = "red";
          valid = false;
        } else if (isNaN(n1.value)) {
          n1.style.backgroundColor = "yellow";
          valid = false;
        } else {
          n1.style.backgroundColor = "white";
        }

        if (n2.value == "") {
          n2.style.backgroundColor = "red";
          valid = false;
        } else if (isNaN(n2.value)) {
          n2.style.backgroundColor = "yellow";
          valid = false;
        } else {
          n2.style.backgroundColor = "white";
        }

        cal(valid);
      }
    </script>
  </head>

  <body>
    <table>
      <tr>
        <td>
          <input
            type="text"
            id="num1"
            placeholder="num1"
            onblur="resultdisplay()"
          />

          <label>+</label>

          <input
            type="text"
            id="num2"
            placeholder="num2"
            onblur="resultdisplay()"
          />

          <button onclick="resultdisplay()">=</button>

          <input type="text" id="output" readonly placeholder="output" />
        </td>
      </tr>
    </table>
  </body>
</html>
