<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KYC</title>
  </head>
  
  <body>

<script>
function handleClick(){
  var name=document.getElementById("ename").value;
  var email=document.getElementById("email").value;
  var dob=document.getElementById("dob").value;
  var gender=document.getElementsByName("gender");
  var selectedGender="";
  var Aadhar=document.getElementById("no").value;
  var pan= document.getElementById("pAN").value;
  var phNo=document.getElementById("phNumber").value;
  var Scity=document.getElementById("city").value;
  
  for(let i=0;i<gender.length;i++){
if(gender[i].checked){
selectedGender=gender[i].id;
}    
  }
console.log(`Name :${name}
Email: ${email}
DOB: ${dob}
Gender: ${selectedGender}
Adhar: ${Aadhar}
Pan: ${pan}
PhoneNumber: ${phNo}
City: ${Scity}`);

}
</script>
<form>  <table>
    <tr>
      <td>
        <label>Name</label>
      </td>
      <td>
        <input type="text" ename="name" id="ename" required />
      </td>
    </tr>
    <tr>
      <td>
        <label>Email</label>
      </td>
      <td>
        <input
          type="email"
          ename="email"
          id="email"
          required
          placeholder="abc@gmail.com"
        />
      </td>
    </tr>
    <tr>
      <td>
        <label>DOB</label>
      </td>
      <td>
        <input type="date" name="dob" id="dob" max="2008-01-01" required />
      </td>
    </tr>
    <tr>
      <td>
        <label>Gender</label>
      </td>
      <td>
        <input type="radio" name="gender" id="Male" />
        <label id="labelinfo" for="Male">Male</label>

        <input type="radio" name="gender" id="Female" />
        <label id="labelinfo" for="Female"> Female </label>
      </td>
    </tr>
    <tr>
      <td>
        <label> AadharNo.</label>
      </td>
      <td>
        <input
          type="text"
          id="no"
          name="Adhar"
          pattern="[0-9]{12}"
          placeholder="123456789021"
          required
        />
      </td>
    </tr>
    <tr>
      <td>
        <label>PanNumber</label>
      </td>

      <td>
        <input
          type="text"
          id="pAN"
          name="Pan"
          pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}"
          required
          placeholder="ABCDE1234F"
        />
      </td>
    </tr>
    <tr>
      <td>
        <label>PhoneNumber</label>
      </td>
      <td>
        <input
          type="text"
          name="phNo"
          id="phNumber"
          required
          pattern="[0-9]{10}"
          placeholder="0123456789"
        />
      </td>
    </tr>
    <tr>
      <td>
        <label>City</label>
      </td>
      <td>
        <select id="city" name="city" required>
          <option value="">select</option>

          <option value="1">Hyderabad</option>
          <option value="2">Mumbai</option>
          <option value="3">Delhi</option>
          <option value="4">Pune</option>
          <option value="5">Amritsar</option>
        </select>
      </td>
    </tr>
    <tr>
      <td>
        <input type="submit" value="submit" onclick="handleClick(); return false;"/>
        <input type="reset" />
      </td>
    </tr>
    </form>

  </table>

</body>
</html>
