<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script> -->

    <form>
      <table>
        <tr>
          <td>
            <label>LoanAmount</label>
            <input type="text" id="amount" />
          </td>
        </tr>
        <tr>
          <td>
            <label>InterestRate: </label>
            <input type="number" id="rate" />
          </td>
        </tr>
        <tr>
          <td>
            <label>Tenure</label>
            <input type="text" id="months" />
          </td>
        </tr>
        <tr>
          <td>
            <button type="button" onclick="calculateEMI()">Calculate</button>
          </td>
        </tr>
      </table>
    </form>
    <table class="table table-striped table-hover">
      <tr></tr>
      <tr></tr>
      <tr></tr>
      <thead>
        <tr>
          <th>SNO</th>
          <th>Loan Left</th>
          <th>EMI</th>
          <th>Principal</th>
          <th>Interest</th>
          <th>Remaining Balance</th>
        </tr>
      </thead>
      <tbody id="SheduleBody"></tbody>
    </table>
    <script>
      function calculateEMI() {
        let P = parseFloat(document.getElementById("amount").value);
        let annualRate = parseFloat(document.getElementById("rate").value);
        let n = parseInt(document.getElementById("months").value);

        let r = annualRate / 12 / 100;

        let EMI = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);

        let balance = P;

        let tbody = document.getElementById("SheduleBody");
        tbody.innerHTML = "";

        for (let i = 1; i <= n; i++) {
          //   let loanLeft = balance;
          let interest = balance * r;
          let principal = EMI - interest;
          balance = balance - principal;

          let row = `<tr>
<td align="center">${i.toFixed(2)}</td>
<td>${balance.toFixed(2)}</td>
<td>${EMI.toFixed(2)}</td>
<td>${principal.toFixed(2)}</td>
<td>${interest.toFixed(2)}</td>
<td class="text-end">${balance.toFixed(2)}</td>
</tr>`;

          tbody.innerHTML += row;
        }
      }
    </script>
  </body>
</html>
